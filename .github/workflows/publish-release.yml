name: Publicar ISO como Release

# Coge el artefacto solux-os-iso de un run de build y lo publica como
# Release (descarga por CDN, rápida y reanudable). No recompila.
# © 2026 Pollocrudo Company

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID del build que contiene el artefacto solux-os-iso"
        required: true

permissions:
  contents: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar la ISO del run de build
        uses: actions/download-artifact@v4
        with:
          name: solux-os-iso
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: iso

      - name: Partir la ISO (limite de 2 GB por archivo en Releases) y publicar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd iso
          ISO=$(ls *.iso)
          echo "ISO original: $ISO"
          split -b 1900M -d -a 1 "$ISO" "${ISO}.part"
          rm -f "$ISO"
          ls -lh
          TAG="v1.0-phoenix"
          {
            printf 'ISO oficial de Solux OS 1.0 "Phoenix" (edicion lite, 2.6 GB).\n\n'
            printf 'GitHub limita cada archivo de Release a 2 GB, por eso va en 2 partes.\n'
            printf 'Descarga las dos y unelas:\n\n'
            printf 'Windows (CMD):\n'
            printf '  copy /b "%s.part0" + "%s.part1" "%s"\n\n' "$ISO" "$ISO" "$ISO"
            printf 'Linux / macOS:\n'
            printf '  cat %s.part* > %s\n\n' "$ISO" "$ISO"
            printf 'Verificar integridad:\n'
            printf '  sha256sum -c %s.sha256\n' "$ISO"
          } > notes.txt
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" ${ISO}.part* ${ISO}.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --title 'Solux OS 1.0 "Phoenix"' \
            --notes-file notes.txt
          echo "Publicado en: https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG"
