name: Publicar ISO como Release

# Coge el artefacto solux-os-iso de un run de build y lo publica como
# Release (descarga por CDN, rápida y reanudable). No recompila.
# © 2026 Pollocrudo Company

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID del build que contiene el artefacto solux-os-iso"
        required: true

permissions:
  contents: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar la ISO del run de build
        uses: actions/download-artifact@v4
        with:
          name: solux-os-iso
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: iso

      - name: Partir la ISO (límite de 2 GB por archivo en Releases) y publicar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd iso
          ISO=$(ls *.iso)
          echo "ISO original: $ISO"
          # Partir en trozos de 1900 MB (< 2 GB cada uno)
          split -b 1900M -d -a 1 "$ISO" "${ISO}.part"
          rm -f "$ISO"     # no subir el archivo entero (>2 GB)
          ls -lh
          TAG="v1.0-phoenix"
          NOTES="ISO oficial de Solux OS 1.0 \"Phoenix\" (edición lite, 2.6 GB).

GitHub limita cada archivo de Release a 2 GB, así que va en 2 partes. Descárgalas las dos y únelas:

Windows (CMD):
  copy /b \"${ISO}.part0\" + \"${ISO}.part1\" \"${ISO}\"

Linux / macOS:
  cat ${ISO}.part* > ${ISO}

Verificar integridad:
  sha256sum -c ${ISO}.sha256"
          # Recrear el release limpio
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" ${ISO}.part* ${ISO}.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --title "Solux OS 1.0 \"Phoenix\"" \
            --notes "$NOTES"
          echo "Publicado en: https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG"
