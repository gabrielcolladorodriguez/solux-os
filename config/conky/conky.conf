--[[
  Solux OS — Widget Conky de monitorización y seguridad
  © 2026 Pollocrudo Company
]]

conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 0,
    cpu_avg_samples = 2,
    default_color = 'F1F5F9',
    color1 = 'F97316',   -- naranja (títulos)
    color2 = '3B82F6',   -- azul (etiquetas)
    color3 = '22D3EE',   -- cyan (valores)
    color4 = '22C55E',   -- verde (ok)
    color5 = '94A3B8',   -- gris secundario
    double_buffer = true,
    draw_shades = false,
    draw_outline = false,
    font = 'JetBrains Mono:size=9',
    gap_x = 30,
    gap_y = 60,
    minimum_width = 260,
    no_buffers = true,
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 160,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    update_interval = 2.0,
    use_xft = true,
    xftalpha = 0.9,
}

conky.text = [[
${color1}${font Inter:bold:size=14}SOLUX OS${font}${color}  ${color5}1.0 Phoenix${color}
${color2}${hr 2}${color}
${color1}SISTEMA${color}
${color2}Host:${color3} ${nodename}${color}
${color2}Kernel:${color3} ${kernel}${color}
${color2}Uptime:${color3} ${uptime}${color}

${color1}CPU${color}
${color2}Uso:${color3} ${cpu}%${color}   ${cpubar 6}
${color2}Temp:${color3} ${acpitemp}°C${color}

${color1}MEMORIA${color}
${color2}RAM:${color3} $mem / $memmax${color}
${membar 6}

${color1}DISCO${color}
${color2}Raíz:${color3} ${fs_used /} / ${fs_size /}${color}
${fs_bar 6 /}

${color1}RED${color}
${color2}Baja:${color3} ${downspeed eth0}${color}  ${color2}Sube:${color3} ${upspeed eth0}${color}

${color1}SEGURIDAD${color}
${color2}Firewall:${color4} ${if_match "${execi 30 systemctl is-active ufw}"=="active"}ACTIVO${else}${color danger}INACTIVO${endif}${color}
${color2}AppArmor:${color4} ${execi 60 aa-status --enabled && echo ENFORCE || echo off}${color}
]]
