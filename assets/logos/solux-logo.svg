<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 256" width="720" height="256" role="img" aria-label="Solux OS">
  <defs>
    <radialGradient id="sun2" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="45%" stop-color="#FBBF24"/>
      <stop offset="80%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </radialGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="word" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- Mark, scaled into left area -->
  <g transform="translate(0,0) scale(1)">
    <circle cx="128" cy="128" r="112" fill="none" stroke="url(#ring2)" stroke-width="8" opacity="0.9"/>
    <circle cx="128" cy="128" r="112" fill="none" stroke="#22D3EE" stroke-width="2" stroke-dasharray="4 10" opacity="0.6"/>
    <g fill="url(#sun2)">
      <g id="rays2"><rect x="123" y="18" width="10" height="26" rx="5"/></g>
      <use href="#rays2" transform="rotate(30 128 128)"/>
      <use href="#rays2" transform="rotate(60 128 128)"/>
      <use href="#rays2" transform="rotate(90 128 128)"/>
      <use href="#rays2" transform="rotate(120 128 128)"/>
      <use href="#rays2" transform="rotate(150 128 128)"/>
      <use href="#rays2" transform="rotate(180 128 128)"/>
      <use href="#rays2" transform="rotate(210 128 128)"/>
      <use href="#rays2" transform="rotate(240 128 128)"/>
      <use href="#rays2" transform="rotate(270 128 128)"/>
      <use href="#rays2" transform="rotate(300 128 128)"/>
      <use href="#rays2" transform="rotate(330 128 128)"/>
    </g>
    <circle cx="128" cy="128" r="70" fill="url(#sun2)"/>
    <path d="M156 100 c-6-10-20-16-34-16 c-18 0-32 10-32 26 c0 16 16 22 32 26 c16 4 24 8 24 16 c0 10-12 16-26 16 c-14 0-26-6-32-16"
          fill="none" stroke="#0D0D1A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="270" y="140" font-family="Inter, 'Segoe UI', sans-serif" font-size="88" font-weight="800" fill="url(#word)">Solux</text>
  <text x="272" y="196" font-family="Inter, 'Segoe UI', sans-serif" font-size="40" font-weight="600" fill="#3B82F6" letter-spacing="8">OS</text>
  <text x="342" y="196" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="400" fill="#94A3B8">1.0 Phoenix</text>
</svg>
