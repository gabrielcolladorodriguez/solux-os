<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Solux OS logo mark">
  <defs>
    <radialGradient id="sun" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="45%" stop-color="#FBBF24"/>
      <stop offset="80%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Orbital / shield ring -->
  <circle cx="128" cy="128" r="112" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.9"/>
  <circle cx="128" cy="128" r="112" fill="none" stroke="#22D3EE" stroke-width="2" stroke-dasharray="4 10" opacity="0.6"/>

  <!-- Sun rays -->
  <g fill="url(#sun)" filter="url(#glow)">
    <g id="rays">
      <rect x="123" y="18" width="10" height="26" rx="5"/>
    </g>
    <use href="#rays" transform="rotate(30 128 128)"/>
    <use href="#rays" transform="rotate(60 128 128)"/>
    <use href="#rays" transform="rotate(90 128 128)"/>
    <use href="#rays" transform="rotate(120 128 128)"/>
    <use href="#rays" transform="rotate(150 128 128)"/>
    <use href="#rays" transform="rotate(180 128 128)"/>
    <use href="#rays" transform="rotate(210 128 128)"/>
    <use href="#rays" transform="rotate(240 128 128)"/>
    <use href="#rays" transform="rotate(270 128 128)"/>
    <use href="#rays" transform="rotate(300 128 128)"/>
    <use href="#rays" transform="rotate(330 128 128)"/>
  </g>

  <!-- Sun disc -->
  <circle cx="128" cy="128" r="70" fill="url(#sun)" filter="url(#glow)"/>

  <!-- Letter S -->
  <path d="M156 100
           c-6-10-20-16-34-16
           c-18 0-32 10-32 26
           c0 16 16 22 32 26
           c16 4 24 8 24 16
           c0 10-12 16-26 16
           c-14 0-26-6-32-16"
        fill="none" stroke="#0D0D1A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
