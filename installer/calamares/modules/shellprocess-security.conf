# Solux OS — Post-instalación de seguridad (Calamares shellprocess)
# Se ejecuta en el sistema instalado (chroot) para reactivar el hardening que depende
# del hardware/particiones reales tras la instalación.
---
dontChroot: false
timeout: 600
verbose: true

script:
    - "systemctl enable ufw.service || true"
    - "systemctl enable nftables.service || true"
    - "systemctl enable fail2ban.service || true"
    - "systemctl enable apparmor.service || true"
    - "systemctl enable clamav-freshclam.service || true"
    - "systemctl enable unattended-upgrades.service || true"
    - "aideinit -y -f || true"
    - "update-grub || true"
    - "command -v update-apparmor-profiles >/dev/null 2>&1 && update-apparmor-profiles || true"
    - "passwd -l root || true"
