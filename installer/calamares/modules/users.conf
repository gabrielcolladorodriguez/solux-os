# Solux OS — Módulo de usuarios (Calamares)
# Política de contraseñas estricta acorde al hardening del sistema.
---
defaultGroups:
    - cdrom
    - floppy
    - sudo
    - audio
    - dip
    - video
    - plugdev
    - netdev

autologinGroup:  autologin
doAutologin:     false
sudoersGroup:    sudo

setRootPassword: false          # root permanece bloqueado; se usa sudo
availableShells: /bin/bash, /usr/bin/zsh

avatarFilePath: ~/.face

# Política de contraseñas: flexible. El usuario elige la suya (o una sencilla).
passwordRequirementsWidget: true
allowWeakPasswords: true
allowWeakPasswordsDefault: true

# Validación mínima y razonable (mínimo 8, sin requisitos absurdos)
passwordRequirements:
    minLength: 8
    maxLength: -1
    libpwquality:
        - minlen=8
        - minclass=1
