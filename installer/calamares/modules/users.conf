# Solux OS — Módulo de usuarios (Calamares)
# Política de contraseñas estricta acorde al hardening del sistema.
---
defaultGroups:
    - cdrom
    - floppy
    - sudo
    - audio
    - dip
    - video
    - plugdev
    - netdev

autologinGroup:  autologin
doAutologin:     false
sudoersGroup:    sudo

setRootPassword: false          # root permanece bloqueado; se usa sudo
availableShells: /bin/bash, /usr/bin/zsh

avatarFilePath: ~/.face

# Política de contraseñas
passwordRequirementsWidget: true
allowWeakPasswords: false
allowWeakPasswordsDefault: false

# Validación mínima (refuerza la política PAM del sistema)
passwordRequirements:
    minLength: 12
    maxLength: -1
    libpwquality:
        - minlen=12
        - minclass=3
        - dcredit=-1
        - ucredit=-1
        - ocredit=-1
        - lcredit=-1
